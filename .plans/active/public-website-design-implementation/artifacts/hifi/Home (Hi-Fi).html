<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Greenpill Network — Home (Hi-Fi)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="hifi/gp-tokens.css" />
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #0A2D21; }
  * { box-sizing: border-box; }
  body {
    font-family: var(--gp-font-body);
    color: var(--gp-fg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ───────────── gallery shell (matches Library) ───────────── */
  .hf-gallery {
    min-height: 100vh;
    padding: 32px 24px 120px;
    background:
      radial-gradient(circle at 20% 10%, rgba(184,232,53,0.04), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(240,220,160,0.04), transparent 50%),
      #0A2D21;
  }
  .hf-bar {
    max-width: 1440px;
    margin: 0 auto 24px;
    display: flex; justify-content: space-between; align-items: baseline;
    color: rgba(250,247,238,0.45);
    font-family: var(--gp-font-mono);
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .hf-bar .lhs { display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap; }
  .hf-bar .lhs b {
    color: var(--gp-secondary);
    font-family: var(--gp-font-display);
    font-size: 14px; font-weight: 500;
    letter-spacing: -0.005em;
    text-transform: none;
  }
  .hf-bar .sep { opacity: 0.5; }

  /* ───────────── page shell ───────────── */
  .hm-page {
    position: relative;
    background: var(--gp-green-900);
    overflow: hidden;
    /* container queries inside this page swap layouts based on the framed
       width — not the viewport width — so the Tweaks breakpoint selector
       actually changes responsive behavior inside the frame. */
    container-type: inline-size;
    container-name: hm-page;
  }
  .hm-page-topo {
    position: absolute; inset: 0;
    background-image: url("hifi/assets/topo-bg.png");
    background-size: cover;
    background-position: center;
    opacity: 0.11;
    mix-blend-mode: overlay;
    pointer-events: none;
  }
  .hm-page-inner {
    position: relative;
    z-index: 1;
    max-width: 1440px;
    margin: 0 auto;
  }

  /* ───────────── section primitives ───────────── */
  .hm-section {
    padding: clamp(48px, 7vw, 96px) clamp(20px, 5vw, 96px);
    position: relative;
  }
  .hm-section + .hm-section {
    border-top: 1px solid var(--gp-border-soft);
  }
  .hm-section-center {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hm-section-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 32px;
    margin-bottom: clamp(24px, 3vw, 36px);
    flex-wrap: wrap;
  }
  @container hm-page (max-width: 720px) {
    .hm-section-head { gap: 14px; }
  }

  /* ───────────── HERO ───────────── */
  .hm-hero {
    padding-top: clamp(56px, 8vw, 112px);
    padding-bottom: clamp(56px, 7vw, 96px);
  }
  .hm-hero-inner {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: clamp(24px, 3vw, 36px);
  }
  .hm-hero-map {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ───────────── CHAPTER STORIES ─────────────
     Desktop:
       [BIG  | s0 | s1 ]
       [BIG  | s2 wide ]
     Tablet (720–1023): big full row, then 1 + 2 split
     Mobile (<720): 1 column stack
  */
  .hm-stories-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    grid-template-rows: auto auto;
    gap: clamp(14px, 1.5vw, 20px);
  }
  .hm-story {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: clamp(16px, 1.6vw, 24px);
    background: var(--gp-green-700);
    border: 1px solid var(--gp-border-soft);
    border-radius: var(--gp-radius-lg);
    overflow: hidden;
    min-width: 0;
    transition: border-color 200ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .hm-story:hover { border-color: rgba(184,232,53,0.32); }
  .hm-story-body { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 0; }
  .hm-story-big {
    grid-column: 1 / 2;
    grid-row: 1 / 3;
  }
  .hm-story-big .hm-story-body { gap: 14px; }
  .hm-stories-grid .hm-story:nth-child(2) { grid-column: 2 / 3; grid-row: 1 / 2; }
  .hm-stories-grid .hm-story:nth-child(3) { grid-column: 3 / 4; grid-row: 1 / 2; }
  .hm-story-wide { grid-column: 2 / 4; grid-row: 2 / 3; flex-direction: row; align-items: stretch; }
  .hm-story-wide > :first-child { flex: 0 0 38%; }
  .hm-story-wide .hm-story-body { padding-left: 4px; }

  @container hm-page (max-width: 1100px) {
    .hm-stories-grid {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
    }
    .hm-story-big { grid-column: 1 / 3; grid-row: 1 / 2; }
    .hm-stories-grid .hm-story:nth-child(2) { grid-column: 1 / 2; grid-row: 2 / 3; }
    .hm-stories-grid .hm-story:nth-child(3) { grid-column: 2 / 3; grid-row: 2 / 3; }
    .hm-story-wide { grid-column: 1 / 3; grid-row: 3 / 4; }
  }
  @container hm-page (max-width: 720px) {
    .hm-stories-grid {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
    }
    .hm-story-big, .hm-story-wide,
    .hm-stories-grid .hm-story:nth-child(2),
    .hm-stories-grid .hm-story:nth-child(3) {
      grid-column: 1 / 2; grid-row: auto;
    }
    .hm-story-wide { flex-direction: column; }
    .hm-story-wide > :first-child { flex: 0 0 auto; }
  }

  /* ───────────── LIBRARY BENTO ───────────── */
  .hm-lib-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto auto auto;
    gap: clamp(14px, 1.5vw, 20px);
  }
  .hm-lib-books    { grid-column: 1 / 6;  grid-row: 1 / 3; }
  .hm-lib-podcast  { grid-column: 6 / 13; grid-row: 1 / 2; }
  .hm-lib-dev      { grid-column: 6 / 10; grid-row: 2 / 3; }
  .hm-lib-greensci { grid-column: 10 / 13; grid-row: 2 / 3; }
  .hm-lib-toolkit  { grid-column: 1 / 7;  grid-row: 3 / 4; }
  .hm-lib-map      { grid-column: 7 / 13; grid-row: 3 / 4; }

  .hm-lib-books-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
  }

  .hm-lib-podcast-body {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 18px;
    align-items: stretch;
    flex: 1;
    min-width: 0;
  }
  .hm-lib-podcast-cover { min-width: 0; }
  .hm-lib-podcast-text {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
    flex: 1;
  }

  @container hm-page (max-width: 1100px) {
    .hm-lib-grid {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: auto;
    }
    .hm-lib-books    { grid-column: 1 / 3; grid-row: auto; }
    .hm-lib-podcast  { grid-column: 1 / 3; grid-row: auto; }
    .hm-lib-dev      { grid-column: 1 / 2; grid-row: auto; }
    .hm-lib-greensci { grid-column: 2 / 3; grid-row: auto; }
    .hm-lib-toolkit  { grid-column: 1 / 2; grid-row: auto; }
    .hm-lib-map      { grid-column: 2 / 3; grid-row: auto; }
  }
  @container hm-page (max-width: 720px) {
    .hm-lib-grid { grid-template-columns: 1fr; }
    .hm-lib-books, .hm-lib-podcast, .hm-lib-dev,
    .hm-lib-greensci, .hm-lib-toolkit, .hm-lib-map {
      grid-column: 1 / 2;
    }
    .hm-lib-books-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .hm-lib-podcast-body {
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .hm-lib-podcast-cover { max-width: 200px; }
  }

  /* ───────────── ECOSYSTEM ───────────── */
  .hm-eco-intro {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: clamp(28px, 3.5vw, 48px);
    width: 100%;
  }
  .hm-eco-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: clamp(12px, 1.4vw, 18px);
    width: 100%;
  }
  .hm-eco-tile {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: clamp(18px, 2vw, 26px);
    background: var(--gp-green-700);
    border: 1px solid var(--gp-border-soft);
    border-radius: var(--gp-radius-lg);
    text-decoration: none;
    color: var(--gp-fg);
    transition: border-color 200ms cubic-bezier(0.22, 1, 0.36, 1),
                background 200ms cubic-bezier(0.22, 1, 0.36, 1);
    min-width: 0;
    position: relative;
  }
  .hm-eco-tile:hover {
    border-color: rgba(184,232,53,0.38);
    background: var(--gp-green-600);
  }
  .hm-eco-mark {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gp-primary);
    box-shadow: 0 0 12px rgba(184,232,53,0.5);
    flex: none;
  }
  .hm-eco-tile:hover .hm-eco-mark {
    box-shadow: 0 0 18px rgba(184,232,53,0.85);
  }
  .hm-eco-name {
    font-family: var(--gp-font-display);
    font-size: clamp(20px, 1.8vw, 24px);
    font-weight: 500;
    color: var(--gp-secondary);
    letter-spacing: -0.01em;
    line-height: 1.15;
    text-wrap: pretty;
  }
  .hm-eco-blurb {
    font-family: var(--gp-font-body);
    font-size: 13px;
    color: var(--gp-fg-muted);
    line-height: 1.45;
  }
  @container hm-page (max-width: 1100px) {
    .hm-eco-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  }
  @container hm-page (max-width: 720px) {
    .hm-eco-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  /* ───────────── GARDEN RAMP ───────────── */
  .hm-garden-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: clamp(14px, 1.5vw, 20px);
  }
  .hm-garden-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: clamp(20px, 2vw, 28px);
    background: var(--gp-green-700);
    border: 1px solid var(--gp-border-soft);
    border-radius: var(--gp-radius-lg);
    min-width: 0;
    min-height: 240px;
  }
  .hm-garden-head {
    display: flex; align-items: center; gap: 12px;
    min-width: 0;
  }
  .hm-garden-num {
    font-family: var(--gp-font-display);
    font-size: 32px;
    font-weight: 500;
    color: var(--gp-primary);
    line-height: 1;
    letter-spacing: -0.02em;
    flex: none;
  }
  .hm-garden-action { margin-top: auto; padding-top: 8px; min-width: 0; }
  .hm-garden-email {
    display: flex;
    gap: 8px;
    width: 100%;
    min-width: 0;
  }
  .hm-garden-input {
    flex: 1 1 0;
    min-width: 0;
    height: 40px;
    padding: 0 14px;
    background: var(--gp-green-800);
    border: 1px solid var(--gp-border-soft);
    border-radius: var(--gp-radius-pill);
    color: var(--gp-fg);
    font-family: var(--gp-font-body);
    font-size: 13px;
    outline: none;
    transition: border-color 200ms;
  }
  .hm-garden-input::placeholder { color: var(--gp-fg-dim); }
  .hm-garden-input:focus { border-color: var(--gp-primary); box-shadow: var(--gp-shadow-focus); }
  .hm-garden-btn {
    appearance: none; border: 0;
    height: 40px; padding: 0 18px;
    border-radius: var(--gp-radius-pill);
    background: var(--gp-primary); color: var(--gp-primary-fg);
    font-family: var(--gp-font-body); font-size: 13px; font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex: none;
    transition: background 200ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .hm-garden-btn:hover { background: var(--gp-lime-400); }
  .hm-garden-btn-wide { padding: 0 22px; }

  @container hm-page (max-width: 1100px) {
    .hm-garden-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @container hm-page (max-width: 720px) {
    .hm-garden-grid { grid-template-columns: 1fr; }
    .hm-garden-card { min-height: 0; }
  }

  /* ───────────── animations ───────────── */
  @keyframes hmThreadBreathe {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 0.85; }
  }
  @keyframes hmLiveDot {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.4); }
  }
  @keyframes mcLiveDot {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.4); }
  }
  @keyframes mwFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes mwPlantPulse {
    0%, 100% { transform: scale(1);   filter: brightness(1); }
    50%      { transform: scale(1.15); filter: brightness(1.25); }
  }
  .mc-node-new {
    animation: mcArrive 1200ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes mcArrive {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    40%  { transform: translate(-50%, -50%) scale(2.4); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  @keyframes mcSelfHalo {
    0%, 100% { transform: scale(1);   opacity: 0.65; }
    50%      { transform: scale(1.25); opacity: 0.25; }
  }
  .mc-node:hover { z-index: 10 !important; }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="hifi/gp-shell.jsx"></script>
<script type="text/babel" src="hifi/lib-data.jsx"></script>
<script type="text/babel" src="hifi/lib-bits.jsx"></script>
<script type="text/babel" src="hifi/lib-sections.jsx"></script>
<script type="text/babel" src="hifi/map-themes.jsx"></script>
<script type="text/babel" src="hifi/map-world.jsx"></script>
<script type="text/babel" src="hifi/map-data.jsx"></script>
<script type="text/babel" src="hifi/map-canvas.jsx"></script>
<script type="text/babel" src="hifi/map-walkthrough.jsx"></script>
<script type="text/babel" src="hifi/home-data.jsx"></script>
<script type="text/babel" src="hifi/home-map.jsx"></script>
<script type="text/babel" src="hifi/home-sections.jsx"></script>
<script type="text/babel" src="hifi/home-page.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = {
  "myceliumDensity": "dense",
  "myceliumMotion": "pulse",
  "breakpoint": "desktop"
};

/* Responsive scaler — Home renders at its native frame width (1440/1024/375)
   and scales down to fit the viewport. Mirrors HFFrame from Library so both
   pages preview the same way. Container queries inside .hm-page swap layouts
   based on the framed width, not the browser viewport. */
const HmFrame = ({ density, motion, breakpoint }) => {
  const frameW = breakpoint === 'mobile' ? 375 : breakpoint === 'tablet' ? 1024 : 1440;
  const forceBp = breakpoint === 'mobile' ? 'mobile' : breakpoint === 'tablet' ? 'tablet' : 'desktop';
  const [scale, setScale] = React.useState(1);
  const [innerH, setInnerH] = React.useState(0);
  const wrapRef = React.useRef(null);
  const innerRef = React.useRef(null);

  React.useEffect(() => {
    const update = () => {
      if (!wrapRef.current) return;
      const avail = wrapRef.current.parentElement.clientWidth - 48;
      setScale(Math.min(1, avail / frameW));
    };
    update();
    const ro = new ResizeObserver(update);
    if (wrapRef.current) ro.observe(wrapRef.current.parentElement);
    return () => ro.disconnect();
  }, [frameW]);

  // Track inner height so the outer wrapper sizes to the scaled content
  // (transform: scale doesn't affect layout box).
  React.useEffect(() => {
    if (!innerRef.current) return;
    const ro = new ResizeObserver((entries) => {
      for (const e of entries) setInnerH(e.contentRect.height);
    });
    ro.observe(innerRef.current);
    return () => ro.disconnect();
  }, []);

  return (
    <div ref={wrapRef} style={{
      width: frameW * scale,
      height: innerH * scale || undefined,
      margin: '0 auto',
    }}>
      <div ref={innerRef} style={{
        width: frameW,
        transform: `scale(${scale})`,
        transformOrigin: 'top left',
        boxShadow: '0 20px 80px -20px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04)',
        borderRadius: 4,
        overflow: 'hidden',
      }}>
        <HmHomePage
          density={density}
          motion={motion}
          forceBp={forceBp}
        />
      </div>
    </div>
  );
};

function App() {
  const t = TWEAK_DEFAULTS;
  const raw = useGpRawMode();
  const autoBp = useGpAutoBp();

  if (raw) {
    return (
      <>
        <HmHomePage
          density={t.myceliumDensity}
          motion={t.myceliumMotion}
          forceBp={autoBp}
        />
        <GpViewToggle />
      </>
    );
  }

  const bpLabel = t.breakpoint === 'desktop' ? '1440' : t.breakpoint === 'tablet' ? '1024' : '375';
  const densLabel = t.myceliumDensity.charAt(0).toUpperCase() + t.myceliumDensity.slice(1);
  const motnLabel = t.myceliumMotion.charAt(0).toUpperCase() + t.myceliumMotion.slice(1);

  return (
    <div className="hf-gallery">
      <div className="hf-bar">
        <span className="lhs">
          <b>Home — Hi-Fi</b>
          <span>{densLabel} mycelium</span>
          <span className="sep">·</span>
          <span>{motnLabel} motion</span>
          <span className="sep">·</span>
          <span>{bpLabel}px</span>
        </span>
        <GpViewToggle />
      </div>

      <HmFrame
        density={t.myceliumDensity}
        motion={t.myceliumMotion}
        breakpoint={t.breakpoint}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
