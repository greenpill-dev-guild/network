version: 1
status: locked-defaults

repo:
  name: greenpill-network
  framework: Astro 5
  monorepo_topology: apps-and-packages
  public_content_system: Keystatic local JSON
  workspace_frontend: React app
  current_routes:
    - /

canonical_docs:
  brief: .plans/active/public-website-design-implementation/artifacts/v2/v2-brief.md
  architecture: .plans/active/public-website-design-implementation/artifacts/v2/v2-architecture.md
  delivery: .plans/active/public-website-design-implementation/artifacts/v2/v2-delivery-plan.md
  private_node_intake: .plans/active/content-private-node-scaffold/artifacts/private-node-intake.md
  private_map_node_schema: packages/agent/migrations/001_private_map_node_schema.sql

decision_artifacts:
  steward_brief: .plans/active/public-website-design-implementation/artifacts/steward/steward-brief-one-page.md
  steward_polls: .plans/active/public-website-design-implementation/artifacts/steward/steward-telegram-polls.md
  active_steward_decision_hub: .plans/active/v2-steward-decision-pack
  pending_response_summary: .plans/active/v2-steward-decision-pack/reports/steward-response-summary.md

planning:
  system: .plans
  validation_command: bun scripts/plan-hub.ts validate
  active_hubs:
    - .plans/active/v2-steward-decision-pack
    - .plans/active/content-private-node-scaffold
  backlog_hubs:
    - .plans/backlog/chapter-impact-data-integration
    - .plans/backlog/knowledge-commons-graph-explorer

domains:
  public_site: greenpill.network
  workspace_app: app.greenpill.network
  agent: agent.greenpill.network
  realtime: realtime.greenpill.network
  assets: assets.greenpill.network
  workspace_entrypoint: https://app.greenpill.network/login

hosting:
  public_site: github_pages
  workspace_frontend: vercel_candidate
  backend: fly
  database: fly_managed_postgres
  object_storage: tigris

regions:
  launch:
    primary: iad
    secondary: fra
    expansion_rule: Add a third region only after launch traffic justifies it.

auth:
  scope: workspace_only
  provider_default: privy
  methods_v1:
    - email
    - social
    - passkey
    - wallet
  wallet_entry: login_screen

content:
  public_content_canonical: keystatic
  public_map_source: packages/website/src/content/chapters
  private_node_intake_store: postgres
  private_node_public_projection: public_map_nodes
  private_admin_default_to_evaluate_first: directus
  workspace_v1:
    - docs
    - databases
  workspace_publish_mode: manual_export

permissions:
  roles:
    - public
    - member
    - steward

principles:
  - Keep Astro and Keystatic as the public foundation unless later scope proves they block required features.
  - Replace public Charmverse entry points before deeper workspace parity work.
  - Prefer internal routes over external CTAs for core user journeys.
  - Keep the existing design language and extend it instead of rebranding.
  - Defer the Knowledge Commons Graph Explorer until source lineage, maturity states, relationship grammar, public-use boundaries, and stewardship are ready.
  - Keep the public site anonymous and start auth only inside the workspace app.
  - Treat the workspace as an adjacent package-hosted app backed by Fly services; choose the frontend host when workspace implementation starts.
  - Keep public content canonical in Keystatic and publish workspace content manually first.
  - Keep submitted node emails, raw notes, review notes, spam metadata, IP addresses, and rate-limit keys out of public content and map payloads.
  - Let visitors see their own pending node locally, but publish submitted nodes to everyone only after steward approval.
  - Garden is the public onboarding surface; do not restore the retired standalone onboarding or former join route.
  - Do not create a root guild directory route; route directly to Dev Guild and Writers Guild.
  - Do not create project index or project detail routes; project records remain supporting proof/reference data only.

routes:
  phase_1:
    - /
    - /garden
    - /chapters
    - /guilds/dev-guild
    - /guilds/writers-guild
    - /library
  phase_2:
    - /chapters/[slug]
    - /stories
    - /stories/[slug]

workspace_surfaces:
  phase_3:
    - https://app.greenpill.network/login

content_entities:
  existing:
    - books
    - chapters
    - siteSettings
    - podcast
    - socialLinks
  target:
    - guilds
    - pods
    - projectReferences
    - stories
    - programs
    - resources
    - themes
    - people

private_node_intake:
  agent_route_contracts:
    - POST /map-nodes creates a pending submission with private email storage.
    - GET /map-nodes/public returns approved public_map_nodes only.
  postgres_contracts:
    - map_node_submissions
    - map_node_private_contacts
    - map_node_reviews
    - public_map_nodes
  public_fields:
    - name
    - place
    - city
    - region
    - country
    - lat
    - long
    - role
    - themes
    - public_note
  private_fields_never_public:
    - email
    - raw_note
    - review_notes
    - ip_address
    - rate_limit_key
    - spam_score
    - spam_signals
    - user_agent
  cms_admin_options:
    leading_candidate: directus
    keep_schema_cms_agnostic: true
    compare:
      - directus
      - payload
      - nocodb
      - baserow
      - strapi

phase_order:
  - id: P0
    goal: Align workshop inputs and consolidate them into the canonical V2 docs and implementation manifest.
    outputs:
      - updated brief
      - updated architecture doc
      - updated delivery plan
      - validated AI manifest
      - active steward decision hub
  - id: P1
    goal: Ship the public foundation and remove visible public Charmverse dependency.
    routes:
      - /
      - /garden
      - /chapters
      - /guilds/dev-guild
      - /guilds/writers-guild
      - /library
    acceptance_criteria:
      - No public Charmverse CTA remains in homepage components or social links.
      - New visitors can route into Garden, chapters, Dev Guild, Writers Guild, Library, and Stories from the homepage.
      - Garden and direct guild detail pages have website-native destinations.
      - The retired standalone onboarding, former join route, root guild directory, and project route family remain absent.
      - The public graph explorer is removed and tracked as future knowledge commons work.
  - id: P2
    goal: Add deeper entity pages and a real knowledge commons structure.
    routes:
      - /chapters/[slug]
      - /guilds/dev-guild
      - /guilds/writers-guild
      - /library
      - /stories
      - /stories/[slug]
    acceptance_criteria:
      - Chapter links resolve to internal routes for supported chapters.
      - Stories become first-class public entities and project records remain supporting proof/reference data.
      - The public content model supports all new public entity types.
      - Chapter map locations are generated from the chapters collection.
      - Private node-intake contracts prove public map payloads exclude private fields and pending submissions.
  - id: P3
    goal: Establish the workspace app and member-operations boundary.
    surfaces:
      - https://app.greenpill.network/login
    acceptance_criteria:
      - Workspace hostname exists with intentional transition messaging.
      - Public versus member-operational surfaces are clearly separated.
      - Future auth and role requirements are documented.
      - Docs and databases are the first defined workspace primitives.

migration_targets:
  - key: onboarding_charmverse
    source: packages/website/src/components/ParticipateSection.astro
    current_url: retired Charmverse onboarding page
    target_route: /garden
    phase: P1
  - key: workspace_cta
    source: packages/website/src/components/ParticipateSection.astro
    current_url: retired Charmverse workspace page
    target_url: https://app.greenpill.network/login
    fallback_route: /garden
    phase: P3
  - key: guild_directory
    source: packages/website/src/components/ParticipateSection.astro
    current_url: legacy Charmverse guild directory page
    target_routes:
      - /guilds/dev-guild
      - /guilds/writers-guild
    phase: P1
  - key: charmverse_invite
    source: packages/website/src/components/ExploreSection.astro
    current_url: retired Charmverse invite page
    target_route: /garden
    phase: P1
  - key: social_links_charmverse
    source: packages/website/src/content/social-links.json
    current_fields:
      - workspaceLogin
      - garden
    target_routes:
      - /garden
    target_urls:
      - https://app.greenpill.network/login
    phase: P1
  - key: chapter_links
    source:
      - packages/website/src/pages/locations.json.ts
      - packages/website/src/content/chapters/*.json
    current_url_pattern: legacy chapter content may still include retired Charmverse chapter pages
    target_route_pattern: /chapters/[slug]
    phase: P2

synthesized_inputs:
  - workshop transcript
  - async forum export
  - board export

open_inputs_required:
  - accepted report from .plans/active/v2-steward-decision-pack/reports/steward-response-summary.md
