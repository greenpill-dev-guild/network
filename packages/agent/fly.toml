app = "network-agent"
primary_region = "iad"

[build]
  # The Fly app config lives beside the Dockerfile. Keep the deploy/build
  # context at the repo root so bun.lock and packages/shared are available.
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/ready"
  timeout = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
