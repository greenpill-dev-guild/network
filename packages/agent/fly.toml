app = "network-agent"
primary_region = "iad"

[build]
  # Run Fly deploys from the repo root so the workspace packages and lockfile are in context.
  dockerfile = "packages/agent/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
