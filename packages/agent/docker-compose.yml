services:
  agent-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: greenpill_network
      POSTGRES_USER: greenpill
      POSTGRES_PASSWORD: greenpill
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenpill -d greenpill_network"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - agent_postgres_data:/var/lib/postgresql/data

volumes:
  agent_postgres_data:
