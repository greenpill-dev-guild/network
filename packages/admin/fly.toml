app = "network-admin"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8055"
  PUBLIC_URL = "https://admin.greenpill.network"
  DB_CLIENT = "pg"
  DB_SEARCH_PATH = "array:public,content,intake,impact,workspace,audit"
  DB_HEALTHCHECK_THRESHOLD = "2000"
  STORAGE_LOCATIONS = "tigris"
  STORAGE_TIGRIS_DRIVER = "s3"
  STORAGE_TIGRIS_REGION = "auto"
  STORAGE_TIGRIS_ENDPOINT = "https://t3.storage.dev"
  STORAGE_TIGRIS_FORCE_PATH_STYLE = "false"
  STORAGE_TIGRIS_ROOT = "directus"
  STORAGE_TIGRIS_HEALTHCHECK_THRESHOLD = "2000"
  FILES_MAX_UPLOAD_SIZE = "25mb"
  WEBSOCKETS_ENABLED = "true"
  CORS_ENABLED = "true"
  CORS_ORIGIN = "https://greenpill.network,https://www.greenpill.network,https://network-admin.fly.dev,https://admin.greenpill.network"
  CORS_CREDENTIALS = "true"
  PASSWORD_RESET_URL_ALLOW_LIST = "https://network-admin.fly.dev,https://admin.greenpill.network"
  USER_INVITE_URL_ALLOW_LIST = "https://network-admin.fly.dev,https://admin.greenpill.network"
  REFRESH_TOKEN_COOKIE_SECURE = "true"
  SESSION_COOKIE_SECURE = "true"
  HSTS_ENABLED = "true"
  RATE_LIMITER_ENABLED = "true"
  RATE_LIMITER_POINTS = "50"
  RATE_LIMITER_DURATION = "1"
  MAX_PAYLOAD_SIZE = "25mb"
  IMPORT_IP_DENY_LIST = "0.0.0.0,127.0.0.1,::1,169.254.169.254"
  EMAIL_VERIFY_SETUP = "false"
  EMAIL_FROM = "Greenpill Network <no-reply@mail.greenpill.network>"
  EMAIL_TRANSPORT = "smtp"
  EMAIL_SMTP_HOST = "smtp.resend.com"
  EMAIL_SMTP_PORT = "587"
  EMAIL_SMTP_USER = "resend"
  EMAIL_SMTP_POOL = "true"
  EMAIL_SMTP_SECURE = "false"
  EMAIL_SMTP_IGNORE_TLS = "false"
  TELEMETRY = "false"

[http_service]
  internal_port = 8055
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/server/ping"
  timeout = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
