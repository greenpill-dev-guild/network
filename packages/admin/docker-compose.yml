services:
  admin-directus:
    image: directus/directus:11.17.0
    ports:
      - "8055:8055"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
      - ./templates:/directus/templates
    environment:
      HOST: "0.0.0.0"
      PORT: "8055"
      PUBLIC_URL: "${DIRECTUS_PUBLIC_URL:-http://localhost:8055}"
      SECRET: "${DIRECTUS_SECRET:-dev-only-directus-secret-change-before-production}"
      DB_CLIENT: "pg"
      DB_CONNECTION_STRING: "${DIRECTUS_DB_CONNECTION_STRING:-postgres://greenpill:greenpill@host.docker.internal:54329/greenpill_network}"
      DB_HEALTHCHECK_THRESHOLD: "${DIRECTUS_DB_HEALTHCHECK_THRESHOLD:-2000}"
      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${DIRECTUS_CORS_ORIGIN:-http://localhost:4321,http://localhost:8055,https://greenpill.network,https://www.greenpill.network,https://network-admin.fly.dev,https://admin.greenpill.network}"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL:-admin@greenpill.network}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD:-directus-local-password}"
      TELEMETRY: "${DIRECTUS_TELEMETRY:-false}"
      IMPORT_IP_DENY_LIST: "0.0.0.0,127.0.0.1,::1,169.254.169.254"
