services:
  admin-directus:
    image: directus/directus:11.17.4
    ports:
      - "8055:8055"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
      - ./templates:/directus/templates
    environment:
      HOST: "0.0.0.0"
      PORT: "8055"
      PUBLIC_URL: "${DIRECTUS_PUBLIC_URL:-http://localhost:8055}"
      SECRET: "${DIRECTUS_SECRET:-dev-only-directus-secret-change-before-production}"
      DB_CLIENT: "pg"
      DB_CONNECTION_STRING: "${DIRECTUS_DB_CONNECTION_STRING:-postgres://greenpill:greenpill@host.docker.internal:54329/greenpill_network}"
      DB_SEARCH_PATH: "${DIRECTUS_DB_SEARCH_PATH:-array:public,content,intake,impact,workspace,audit}"
      DB_HEALTHCHECK_THRESHOLD: "${DIRECTUS_DB_HEALTHCHECK_THRESHOLD:-2000}"
      STORAGE_LOCATIONS: "local"
      STORAGE_LOCAL_DRIVER: "local"
      STORAGE_LOCAL_ROOT: "/directus/uploads"
      FILES_MAX_UPLOAD_SIZE: "${DIRECTUS_FILES_MAX_UPLOAD_SIZE:-25mb}"
      MAX_PAYLOAD_SIZE: "${DIRECTUS_MAX_PAYLOAD_SIZE:-25mb}"
      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${DIRECTUS_CORS_ORIGIN:-http://localhost:4321,http://localhost:8055,https://greenpill.network,https://www.greenpill.network,https://network-admin.fly.dev,https://admin.greenpill.network}"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL:-admin@greenpill.network}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD:-directus-local-password}"
      EMAIL_VERIFY_SETUP: "${DIRECTUS_EMAIL_VERIFY_SETUP:-false}"
      EMAIL_FROM: "${DIRECTUS_EMAIL_FROM:-Greenpill Network <no-reply@mail.greenpill.network>}"
      EMAIL_TRANSPORT: "${DIRECTUS_EMAIL_TRANSPORT:-sendmail}"
      EMAIL_SMTP_HOST: "${DIRECTUS_EMAIL_SMTP_HOST:-}"
      EMAIL_SMTP_PORT: "${DIRECTUS_EMAIL_SMTP_PORT:-587}"
      EMAIL_SMTP_USER: "${DIRECTUS_EMAIL_SMTP_USER:-}"
      EMAIL_SMTP_PASSWORD: "${DIRECTUS_EMAIL_SMTP_PASSWORD:-}"
      EMAIL_SMTP_SECURE: "${DIRECTUS_EMAIL_SMTP_SECURE:-false}"
      EMAIL_SMTP_POOL: "${DIRECTUS_EMAIL_SMTP_POOL:-true}"
      TELEMETRY: "${DIRECTUS_TELEMETRY:-false}"
      IMPORT_IP_DENY_LIST: "0.0.0.0,127.0.0.1,::1,169.254.169.254"
